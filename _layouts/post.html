---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    {%- assign date_format = site.date_format | default: "%B %d, %Y" -%}
    <time class="post-meta" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: date_format }}</time>
  </header>
  {{ content }}
</article>
